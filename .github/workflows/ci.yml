name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  COMPOSE_FILE: infra/docker/docker-compose.test.yml
  BACKEND_CONTAINER: flowform-backend-test

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run backend security checks
        run: ./scripts/backend/run_backend_security.sh


  test:
    runs-on: ubuntu-latest
    needs: security
    environment: test

    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Export temp secret directory
        run: |
          echo "FLOWFORM_SECRET_DIR=$RUNNER_TEMP/flowform-secrets" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/flowform-secrets"

      - name: Export all vars
        env:
          VARS_JSON: ${{ toJSON(vars) }}
        run: |
          echo "$VARS_JSON" | jq -r 'to_entries[] | select(.value != "") | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Generate test secret files
        run: |
          umask 077

          cat > "$FLOWFORM_SECRET_DIR/DATABASE_CORE_INIT_PASSWORD.test.secret.txt" <<'EOF'
          ${{ secrets.DATABASE_CORE_INIT_PASSWORD }}
          EOF

          cat > "$FLOWFORM_SECRET_DIR/DATABASE_CORE_APP_PASSWORD.test.secret.txt" <<'EOF'
          ${{ secrets.DATABASE_CORE_APP_PASSWORD }}
          EOF

          cat > "$FLOWFORM_SECRET_DIR/DATABASE_RESPONSE_INIT_PASSWORD.test.secret.txt" <<'EOF'
          ${{ secrets.DATABASE_RESPONSE_INIT_PASSWORD }}
          EOF

          cat > "$FLOWFORM_SECRET_DIR/DATABASE_RESPONSE_APP_PASSWORD.test.secret.txt" <<'EOF'
          ${{ secrets.DATABASE_RESPONSE_APP_PASSWORD }}
          EOF

          cat > "$FLOWFORM_SECRET_DIR/FLOWFORM_APP_SECRET_KEY.test.secret.txt" <<'EOF'
          ${{ secrets.FLOWFORM_APP_SECRET_KEY }}
          EOF

      - name: Generate env files
        run: ./scripts/infra/generate-env-files.sh

      - name: Validate rendered Compose config
        run: docker compose -f "$COMPOSE_FILE" config > /tmp/docker-compose.rendered.yml

      - name: Build and start test environment
        run: docker compose -f "$COMPOSE_FILE" up -d --build
      
      - name: Check coverage inside container
        run: docker exec flowform-backend-test ls -lah /app
      
      - name: Find coverage files
        run: docker exec flowform-backend-test find /app -name "*coverage*"

      - name: Wait for backend-test container
        run: |
          WAIT_TIMEOUT=120
          WAIT_ELAPSED=0
          until [ "$(docker inspect -f '{{.State.Status}}' "$BACKEND_CONTAINER" 2>/dev/null)" = "running" ]; do
            STATUS="$(docker inspect -f '{{.State.Status}}' "$BACKEND_CONTAINER" 2>/dev/null)"
            if [ "${STATUS}" = "exited" ] || [ "${STATUS}" = "dead" ]; then
              echo "ERROR: Container '$BACKEND_CONTAINER' entered terminal state '${STATUS}'."
              exit 1
            fi
            if [ "${WAIT_ELAPSED}" -ge "${WAIT_TIMEOUT}" ]; then
              echo "ERROR: Timed out after ${WAIT_TIMEOUT}s waiting for '$BACKEND_CONTAINER' (state: '${STATUS}')."
              exit 1
            fi
            sleep 1
            WAIT_ELAPSED=$((WAIT_ELAPSED + 1))
          done

      - name: Run tests
        run: docker exec "$BACKEND_CONTAINER" \
          uv run pytest tests --cov=app --cov-report=xml:/app/coverage.xml

      - name: Dump service logs
        if: failure()
        run: docker compose -f "$COMPOSE_FILE" logs --no-color

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            backend/coverage.xml
            backend/.coverage
          if-no-files-found: ignore

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-debug-artifacts
          path: |
            /tmp/docker-compose.rendered.yml
            backend/logs
          if-no-files-found: ignore

      - name: Teardown
        if: always()
        run: docker compose -f "$COMPOSE_FILE" down -v --remove-orphans
