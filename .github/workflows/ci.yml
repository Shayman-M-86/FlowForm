name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make security script executable
        run: chmod +x ./scripts/backend/run_backend_security.sh

      - name: Run backend security checks
        run: ./scripts/backend/run_backend_security.sh


  test:
    runs-on: ubuntu-latest
    needs: security
    environment: test

    permissions:
      contents: read

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Export temp secret directory
        run: |
          echo "FLOWFORM_SECRET_DIR=$RUNNER_TEMP/flowform-secrets" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/flowform-secrets"

      # - name: Export all vars
      #   env:
      #     VARS_JSON: ${{ toJSON(vars) }}
      #   shell: bash
      #   run: |
      #     echo "$VARS_JSON" | jq -r 'to_entries[] | select(.value != "") | "\(.key)=\(.value)"' >> "$GITHUB_ENV"


      - name: Generate test secret files
        run: |
          umask 077

          cat > "$FLOWFORM_SECRET_DIR/DATABASE_CORE_INIT_PASSWORD.test.secret.txt" <<'EOF'
          ${{ secrets.DATABASE_CORE_INIT_PASSWORD }}
          EOF

          cat > "$FLOWFORM_SECRET_DIR/DATABASE_CORE_APP_PASSWORD.test.secret.txt" <<'EOF'
          ${{ secrets.DATABASE_CORE_APP_PASSWORD }}
          EOF

          cat > "$FLOWFORM_SECRET_DIR/DATABASE_RESPONSE_INIT_PASSWORD.test.secret.txt" <<'EOF'
          ${{ secrets.DATABASE_RESPONSE_INIT_PASSWORD }}
          EOF

          cat > "$FLOWFORM_SECRET_DIR/DATABASE_RESPONSE_APP_PASSWORD.test.secret.txt" <<'EOF'
          ${{ secrets.DATABASE_RESPONSE_APP_PASSWORD }}
          EOF

          cat > "$FLOWFORM_SECRET_DIR/FLOWFORM_APP_SECRET_KEY.test.secret.txt" <<'EOF'
          ${{ secrets.FLOWFORM_APP_SECRET_KEY }}
          EOF


      - name: Validate rendered Compose config
        run: docker compose -f infra/docker/docker-compose.test.yml config > /tmp/docker-compose.rendered.yml

      - name: Make script executable
        run: chmod +x ./backend/scripts/run-tests-rebuild-teardown.sh

      - name: Run tests
        run: ./backend/scripts/run-tests-rebuild-teardown.sh

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            backend/coverage.xml
            backend/.coverage
          if-no-files-found: ignore

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-debug-artifacts
          path: |
            /tmp/docker-compose.rendered.yml
            backend/logs
          if-no-files-found: ignore

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-debug-artifacts
          path: |
            /tmp/docker-compose.rendered.yml
            backend/logs
          if-no-files-found: ignore

      - name: Teardown
        if: always()
        run: docker compose -f infra/docker/docker-compose.test.yml down -v --remove-orphans