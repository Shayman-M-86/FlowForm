# CI: validation on pull requests and pushes to main/staging.
#
# Flow — security gates each area; lint before test before build where ordered:
#
#   backend-security
#     ├─ backend-lint
#     ├─ backend-test   (lint and tests in parallel)
#     └─ cdk  (checks → synth → diff in one job)
#
#   frontend-security
#     ├─ studio  (lint → test → build in one job)
#     └─ public-site  (lint → build in one job)
#
#   backend-security + frontend-security
#     └─ contracts
#
#   backend-security    pip-audit + Bandit (scripts/backend/run_backend_security.sh)
#   frontend-security   pnpm audit, failing only on High/Critical vulnerabilities
#   backend-lint        Ruff + Pyright over backend/
#   backend-test        pytest with coverage in the Docker test stack
#   studio              studio-app ESLint + Vitest + production build
#   public-site         public-site ESLint (astro plugin) + production build
#   contracts           OpenAPI export drift + generated frontend contract check
#   cdk                 infra/cdk pytest + Ruff + Pyright, hermetic `cdk synth`
#                       (staging + dev), then `cdk diff` against deployed
#                       staging (read-only OIDC role; skipped on fork PRs)
#
# Deploys are NOT here — see deploy.yml (frontends, after green staging CI).

name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  COMPOSE_FILE: infra/docker/docker-compose.test.yml
  BACKEND_CONTAINER: flowform-backend-test
  NODE_VERSION: "22.12.0"
  PNPM_VERSION: "10.24.0"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Run backend security checks
        run: ./scripts/backend/run_backend_security.sh

  frontend-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Audit frontend dependencies
        run: pnpm audit --audit-level high

  backend-lint:
    runs-on: ubuntu-latest
    needs: backend-security
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - name: Sync backend dependencies
        run: uv sync --extra dev
      - name: Ruff
        run: uv run ruff check .
      - name: Pyright
        run: uv run pyright

  backend-test:
    runs-on: ubuntu-latest
    needs: backend-security
    environment: test
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Export temp secret directory
        run: |
          SECRET_DIR="$RUNNER_TEMP/flowform-secrets"
          echo "FLOWFORM_SECRET_DIR=$SECRET_DIR" >> "$GITHUB_ENV"
          mkdir -p "$SECRET_DIR"

      - name: Export all vars
        env:
          VARS_JSON: ${{ toJSON(vars) }}
        run: |
          echo "$VARS_JSON" | jq -r 'to_entries[] | select(.value != "") | "\(.key)=\(.value)"' >> "$GITHUB_ENV"

      - name: Generate test secret files
        env:
          DATABASE_CORE_INIT_PASSWORD: ${{ secrets.DATABASE_CORE_INIT_PASSWORD }}
          DATABASE_CORE_APP_PASSWORD: ${{ secrets.DATABASE_CORE_APP_PASSWORD }}
          DATABASE_RESPONSE_INIT_PASSWORD: ${{ secrets.DATABASE_RESPONSE_INIT_PASSWORD }}
          DATABASE_RESPONSE_APP_PASSWORD: ${{ secrets.DATABASE_RESPONSE_APP_PASSWORD }}
          FLOWFORM_APP_SECRET_KEY: ${{ secrets.FLOWFORM_APP_SECRET_KEY }}
        run: |
          set -eu

          mkdir -p "$FLOWFORM_SECRET_DIR"

          write_secret() {
            name="$1"
            value="$2"
            file="$FLOWFORM_SECRET_DIR/${name}.test.secret.txt"

            printf '%s' "$value" > "$file"
          }

          write_secret "DATABASE_CORE_INIT_PASSWORD" "$DATABASE_CORE_INIT_PASSWORD"
          write_secret "DATABASE_CORE_APP_PASSWORD" "$DATABASE_CORE_APP_PASSWORD"
          write_secret "DATABASE_RESPONSE_INIT_PASSWORD" "$DATABASE_RESPONSE_INIT_PASSWORD"
          write_secret "DATABASE_RESPONSE_APP_PASSWORD" "$DATABASE_RESPONSE_APP_PASSWORD"
          write_secret "FLOWFORM_APP_SECRET_KEY" "$FLOWFORM_APP_SECRET_KEY"

          chmod 0444 "$FLOWFORM_SECRET_DIR"/*.secret.txt

      - name: Generate env files
        run: ./scripts/infra/generate-env-files.sh

      - name: Validate rendered Compose config
        run: docker compose -f "$COMPOSE_FILE" config > /tmp/docker-compose.rendered.yml

      - name: Build backend test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/backend.test.Dockerfile
          tags: flowform-backend-test:ci
          load: true
          cache-from: type=gha,scope=flowform-backend-test
          cache-to: type=gha,mode=max,scope=flowform-backend-test,ignore-error=true

      - name: Start test environment
        run: docker compose -f "$COMPOSE_FILE" up -d --no-build

      - name: Wait for backend-test container
        run: |
          WAIT_TIMEOUT=120
          WAIT_ELAPSED=0
          until [ "$(docker inspect -f '{{.State.Status}}' "$BACKEND_CONTAINER" 2>/dev/null)" = "running" ]; do
            STATUS="$(docker inspect -f '{{.State.Status}}' "$BACKEND_CONTAINER" 2>/dev/null)"
            if [ "${STATUS}" = "exited" ] || [ "${STATUS}" = "dead" ]; then
              echo "ERROR: Container '$BACKEND_CONTAINER' entered terminal state '${STATUS}'."
              exit 1
            fi
            if [ "${WAIT_ELAPSED}" -ge "${WAIT_TIMEOUT}" ]; then
              echo "ERROR: Timed out after ${WAIT_TIMEOUT}s waiting for '$BACKEND_CONTAINER' (state: '${STATUS}')."
              exit 1
            fi
            sleep 1
            WAIT_ELAPSED=$((WAIT_ELAPSED + 1))
          done

      - name: Run tests
        run: docker exec "$BACKEND_CONTAINER" uv run pytest tests --cov=app --cov-report=xml:/app/coverage.xml

      - name: Dump service logs
        if: failure()
        run: docker compose -f "$COMPOSE_FILE" logs --no-color

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            backend/coverage.xml
            backend/.coverage
          if-no-files-found: ignore

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-debug-artifacts
          path: |
            /tmp/docker-compose.rendered.yml
            backend/logs
          if-no-files-found: ignore

      - name: Teardown
        if: always()
        run: docker compose -f "$COMPOSE_FILE" down -v --remove-orphans

  contracts:
    runs-on: ubuntu-latest
    needs: [backend-security, frontend-security]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: OpenAPI contract drift check
        run: bash scripts/shared_script/check-openapi-contracts.sh

  studio:
    runs-on: ubuntu-latest
    needs: frontend-security
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: ESLint (studio-app)
        run: pnpm --filter @flowform/studio-app lint
      - name: Vitest (studio-app)
        run: pnpm --filter @flowform/studio-app test
      - name: Build studio-app
        run: pnpm run build:studio

  public-site:
    runs-on: ubuntu-latest
    needs: frontend-security
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: ESLint (public-site)
        run: pnpm --filter public-site lint
      - name: Clear Astro build cache
        run: rm -rf apps/public-site/node_modules/.astro
      - name: Build public-site
        run: pnpm run build:site

  # One job for the whole CDK pipeline (checks → synth → diff) so the
  # checkout / uv sync / CDK CLI install happen once instead of three times.
  #
  # Synth is hermetic: the hosted-zone lookup is served from the committed
  # cdk.context.json, and the Auth0 public config comes from repo variables
  # (non-secret — these values ship in the built JS bundle anyway).
  #
  # Diff assumes the read-only flowform-staging-ci-preview role via OIDC
  # and is informational (cdk diff exits 0 on differences). Fork PRs can't
  # mint OIDC tokens, so the credential + diff steps are skipped for them.
  cdk:
    runs-on: ubuntu-latest
    needs: backend-security
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: infra/cdk
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: infra/cdk/uv.lock
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: infra/cdk/package-lock.json
      - name: Install CDK CLI
        run: npm ci --prefer-offline --no-audit --fund=false
      - name: Sync CDK dependencies
        run: uv sync --frozen --extra dev
      - name: Pytest (synth-time assertions)
        run: uv run pytest -q
      - name: Ruff
        run: uv run ruff check flowform_infra tests app.py
      - name: Pyright
        run: uv run pyright
      - name: Write staging env config from repo variables
        run: |
          cat > .env.staging <<EOF
          AUTH0_DOMAIN=${{ vars.STAGING_AUTH0_DOMAIN }}
          AUTH0_CLIENT_ID=${{ vars.STAGING_AUTH0_CLIENT_ID }}
          AUTH0_AUDIENCE=${{ vars.STAGING_AUTH0_AUDIENCE }}
          EOF
      - name: Synth staging
        run: npx --no-install cdk synth -c env=staging --quiet
      - name: Synth dev
        run: npx --no-install cdk synth -c env=dev --quiet
      - uses: aws-actions/configure-aws-credentials@v4
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        with:
          role-to-assume: arn:aws:iam::908123139858:role/flowform-staging-ci-preview
          aws-region: ap-southeast-2
      - name: Diff staging
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        run: npx --no-install cdk diff -c env=staging
