# Pre-commit hooks for FlowForm.
#
# Install:  pipx install pre-commit && pre-commit install
# Run all:  pre-commit run --all-files
#
# The openapi-export hook regenerates backend/openapi.yaml whenever any
# backend file that contributes to the spec changes, and re-stages the
# result so the commit includes an up-to-date snapshot.

repos:
  - repo: local
    hooks:
      - id: openapi-export
        name: Regenerate backend/openapi.yaml
        language: system
        # Use the module entry point (not `flask openapi-export`) so we don't
        # have to bootstrap the full app factory — no DB, no logging files,
        # no rate-limit init required just to render the spec.
        entry: bash -c 'cd backend && uv run python -m app.openapi.export && git add openapi.yaml'
        pass_filenames: false
        # Only run when something that actually affects the spec changes.
        files: ^backend/(app/api/.*\.py|app/schema/.*\.py|app/openapi/.*\.py|pyproject\.toml)$
        stages: [pre-commit]
