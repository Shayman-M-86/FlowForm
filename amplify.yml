version: 1

applications:
  - appRoot: frontend/apps/public-site
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 22.12.0
            - nvm use 22.12.0
            - corepack enable
            - cd ../.. && pnpm install --frozen-lockfile --store-dir .pnpm-store
        build:
          commands:
            - cd ../.. && pnpm run build:site
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - ../../.pnpm-store/**/*
          - ../../node_modules/**/*
          - node_modules/**/*
