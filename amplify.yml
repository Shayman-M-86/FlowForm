version: 1

applications:
  - appRoot: frontend/apps/public-site
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 22.12.0
            - nvm use 22.12.0
            - cd ../.. && npm ci
        build:
          commands:
            - npm run build:site
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - node_modules/**/*
