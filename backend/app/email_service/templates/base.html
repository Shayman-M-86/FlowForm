<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{% block title %}FlowForm{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>

  <body style="margin:0;padding:0;background:#f6f7f9;font-family:Arial,sans-serif;color:#1f2937;">
    <div style="display:none;max-height:0;overflow:hidden;">
      {% block preheader %}{% endblock %}
    </div>

    <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background:#f6f7f9;padding:24px 0;">
      <tr>
        <td align="center">
          <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="max-width:600px;background:#ffffff;border-radius:12px;overflow:hidden;">
            <tr>
              <td style="padding:24px 32px;border-bottom:1px solid #e5e7eb;">
                <h1 style="margin:0;font-size:20px;color:#111827;">FlowForm</h1>
              </td>
            </tr>

            <tr>
              <td style="padding:32px;">
                {% block content %}{% endblock %}
              </td>
            </tr>

            <tr>
              <td style="padding:24px 32px;border-top:1px solid #e5e7eb;font-size:12px;color:#6b7280;">
                <p style="margin:0;">
                  This email was sent by FlowForm.
                </p>
                <p style="margin:8px 0 0 0;">
                  If you were not expecting this email, you can safely ignore it.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
