  responses:
    BadRequestError:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            missing_email_claim:
              summary: MissingEmailClaimError
              value:
                code: MISSING_EMAIL_CLAIM
                message: ID token did not contain an email claim.
            survey_no_response_store:
              summary: SurveyNoResponseStoreError
              value:
                code: INVALID_REQUEST
                message: <example>
            submission_invalid:
              summary: SubmissionInvalidError
              value:
                code: INVALID_SUBMISSION
                message: Submission is invalid.
            submission_invalid_timestamps:
              summary: SubmissionInvalidTimestampsError
              value:
                code: INVALID_SUBMISSION_TIMESTAMPS
                message: Submission timestamps are invalid.
            submission_answers_required:
              summary: SubmissionAnswersRequiredError
              value:
                code: SUBMISSION_ANSWERS_REQUIRED
                message: At least one answer is required.
    UnauthorizedError:
      description: Authentication required or token invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalid_id_token_subject:
              summary: InvalidIdTokenSubjectError
              value:
                code: INVALID_ID_TOKEN
                message: ID token did not contain a valid subject.
            token_subject_mismatch:
              summary: TokenSubjectMismatchError
              value:
                code: TOKEN_SUBJECT_MISMATCH
                message: ID token subject did not match the access token subject.
            link_auth_required:
              summary: LinkAuthRequiredError
              value:
                code: LINK_AUTH_REQUIRED
                message: This link requires authentication.
    ForbiddenError:
      description: Authenticated but not authorized for this resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            forbidden:
              summary: ForbiddenError
              value:
                code: FORBIDDEN
                message: You do not have permission to access this resource.
            link_inactive:
              summary: LinkInactiveError
              value:
                code: LINK_INACTIVE
                message: This link is inactive
            link_expired:
              summary: LinkExpiredError
              value:
                code: LINK_EXPIRED
                message: This link has expired
            link_no_response:
              summary: LinkNoResponseError
              value:
                code: LINK_NO_RESPONSE
                message: This link does not allow submissions
            link_assignment_mismatch:
              summary: LinkAssignmentMismatchError
              value:
                code: LINK_ASSIGNED_TO_ANOTHER_USER
                message: This link is assigned to a different user.
            link_already_used:
              summary: LinkAlreadyUsedError
              value:
                code: LINK_ALREADY_USED
                message: This link has already been used.
            survey_not_accessible:
              summary: SurveyNotAccessibleError
              value:
                code: SURVEY_NOT_ACCESSIBLE
                message: This survey is not accessible in this context.
    NotFoundError:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            link_not_found:
              summary: LinkNotFoundError
              value:
                code: NOT_FOUND
                message: Invalid or unknown token
            public_link_not_found:
              summary: PublicLinkNotFoundError
              value:
                code: NOT_FOUND
                message: Survey link not found
            survey_not_found:
              summary: SurveyNotFoundError
              value:
                code: SURVEY_NOT_FOUND
                message: Survey 0 was not found in project 0.
            survey_not_published:
              summary: SurveyNotPublishedError
              value:
                code: SURVEY_NOT_PUBLISHED
                message: Survey 0 in project 0 is not published.
            survey_not_found_by_slug:
              summary: SurveyNotFoundBySlugError
              value:
                code: NOT_FOUND
                message: Survey not found
            project_not_found:
              summary: ProjectNotFoundError
              value:
                code: NOT_FOUND
                message: Project id=None not found.
            version_not_found:
              summary: VersionNotFoundError
              value:
                code: NOT_FOUND
                message: Version 0 was not found in survey 0.
            node_not_found:
              summary: NodeNotFoundError
              value:
                code: NOT_FOUND
                message: Node not found
            scoring_rule_not_found:
              summary: ScoringRuleNotFoundError
              value:
                code: NOT_FOUND
                message: Scoring rule not found
            submission_not_found:
              summary: SubmissionNotFoundError
              value:
                code: SUBMISSION_NOT_FOUND
                message: Submission 0 not found.
            user_not_found:
              summary: UserNotFoundError
              value:
                code: USER_NOT_FOUND
                message: User <example> not found.
