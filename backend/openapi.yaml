                code: SURVEY_MEMBERSHIP_PROJECT_MISMATCH
                message: The membership does not belong to the given project.
            fk_survey_membership_roles_role_same_project:
              summary: 'DB rule: SURVEY_ROLE_PROJECT_MISMATCH'
              value:
                code: SURVEY_ROLE_PROJECT_MISMATCH
                message: The survey role does not belong to the given project.
    ValidationError:
      description: Request was syntactically valid but semantically invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            link_auth_assignment_required:
              summary: LinkAuthAssignmentRequiredError
              value:
                code: LINK_ASSIGNED_EMAIL_REQUIRED
                message: Links that require authentication must be assigned to an email.
            private_survey_assigned_email_required:
              summary: PrivateSurveyAssignedEmailRequiredError
              value:
                code: ASSIGNED_EMAIL_REQUIRED
                message: Private surveys require links assigned to a specific email.
            survey_visibility_mismatch:
              summary: SurveyVisibilityMismatchError
              value:
                code: SURVEY_VISIBILITY_MISMATCH
                message: <example>
            pydantic_field_validation:
              summary: Pydantic field validation failure
              value:
                code: VALIDATION_ERROR
                message: Request validation failed.
                details:
                  errors:
                  - message: Input should be a valid integer, unable to parse string as an integer
                    type: int_parsing
                    field: sort_key
                  - message: Unable to extract tag using discriminator 'family'
                    type: union_tag_not_found
                    field: content.tagged-union[ChoiceQuestionSchemaIn,FieldQuestionSchemaIn,MatchingQuestionSchemaIn,RatingQuestionSchemaIn]
                  - message: Field required
                    type: missing
                    field: content.RuleSchemaIn.id
                  - message: Field required
                    type: missing
                    field: content.RuleSchemaIn.if
                  - message: Field required
                    type: missing
                    field: content.RuleSchemaIn.then
    RateLimitError:
      description: Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            rate_limit_exceeded:
              summary: RateLimitExceededError
              value:
                code: RATE_LIMIT_EXCEEDED
                message: Rate limit exceeded. Please retry after some time.
    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unhandled_db_integrity:
              summary: UnhandledDbIntegrityError
              value:
                code: UNHANDLED_DB_INTEGRITY_ERROR
                message: An unexpected database integrity error occurred.
                details:
                  constraint_name: null
                  error_key: null
                  context: {}
            ck_survey_versions_published_requires_schema_and_timestamp:
              summary: 'DB rule: VERSION_PUBLISH_STATE_INVALID'
              value:
                code: VERSION_PUBLISH_STATE_INVALID
                message: 'Server invariant violated: survey version id=<survey_version_id> reached status=''published'' without
                  both compiled_schema and published_at. This indicates a code path bypassed surveys_repo.publish_version.'
            ck_survey_submissions_status_valid:
              summary: 'DB rule: SUBMISSION_STATE_INVALID'
              value:
                code: SUBMISSION_STATE_INVALID
                message: 'Server invariant violated: submission id=<submission_id> was written with invalid status=''<status>''.
                  Status is server-controlled and must be one of ''pending'', ''stored'', ''failed''.'
            internal_server_error:
              summary: Generic server error
              value:
                code: INTERNAL_SERVER_ERROR
                message: An unexpected error occurred.
