components:
  schemas:
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
          description: Machine-readable error code.
          maxLength: 128
        message:
          type: string
          description: Human-readable error message.
          maxLength: 1000
        details:
          type: object
          description: Optional structured extras. Pydantic validation errors place their per-field failures here as ``details.errors``.
          additionalProperties: true
    BootstrapUserRequest:
      description: Request body for post-auth user bootstrap.
      properties:
        id_token:
          maxLength: 8192
          minLength: 1
          title: Id Token
          type: string
      required:
      - id_token
      title: BootstrapUserRequest
      type: object
    CurrentUserResponses:
      description: API response shape for a bootstrapped user.
      properties:
        id:
          title: Id
          type: integer
        auth0_user_id:
          title: Auth0 User Id
          type: string
          maxLength: 255
        email:
          title: Email
          type: string
          maxLength: 254
        display_name:
          anyOf:
          - type: string
            maxLength: 100
          - type: 'null'
          title: Display Name
      required:
      - id
      - auth0_user_id
      - email
      - display_name
      title: CurrentUserResponses
      type: object
    ProjectResponses:
      description: API response shape for a project.
      properties:
        id:
          title: Id
          type: integer
        name:
          title: Name
          type: string
          maxLength: 100
        slug:
          title: Slug
          type: string
          maxLength: 80
        created_by_user_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Created By User Id
        created_at:
          format: date-time
          title: Created At
          type: string
          maxLength: 35
      required:
      - id
      - name
      - slug
      - created_by_user_id
      - created_at
      title: ProjectResponses
      type: object
    BootstrapUserResponses:
      description: API response shape for a bootstrap-user request.
      properties:
        created:
          title: Created
          type: boolean
        user:
          $ref: '#/components/schemas/CurrentUserResponses'
        default_project:
          anyOf:
          - $ref: '#/components/schemas/ProjectResponses'
          - type: 'null'
          default: null
      required:
      - created
      - user
      title: BootstrapUserResponses
      type: object
    ProjectInvitationResponses:
      description: API response shape for a project invitation.
      properties:
        id:
          title: Id
          type: integer
        project_id:
          title: Project Id
          type: integer
        project_name:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Project Name
        invited_email:
          maxLength: 254
          title: Invited Email
          type: string
        invite_message:
          anyOf:
          - maxLength: 500
            type: string
          - type: 'null'
          default: null
          title: Invite Message
        invited_by_user_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Invited By User Id
        invited_by_display:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Invited By Display
        role_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Role Id
        status:
          enum:
          - pending
          - accepted
          - declined
          - revoked
          maxLength: 8
          title: Status
          type: string
        expires_at:
          anyOf:
          - format: date-time
            type: string
            maxLength: 35
          - type: 'null'
          title: Expires At
        accepted_at:
          anyOf:
          - format: date-time
            type: string
            maxLength: 35
          - type: 'null'
          title: Accepted At
        created_at:
          format: date-time
          title: Created At
          type: string
          maxLength: 35
      required:
      - id
      - project_id
      - invited_email
      - invited_by_user_id
      - role_id
      - status
      - expires_at
      - accepted_at
      - created_at
      title: ProjectInvitationResponses
      type: object
    MemberUserResponses:
      description: Embedded user details on a project member response.
      properties:
        id:
          title: Id
          type: integer
        email:
          title: Email
          type: string
          maxLength: 254
        display_name:
          anyOf:
          - type: string
            maxLength: 100
          - type: 'null'
          title: Display Name
      required:
      - id
      - email
      - display_name
      title: MemberUserResponses
      type: object
    ProjectMemberResponses:
      description: API response shape for a project membership.
      properties:
        id:
          title: Id
          type: integer
        user_id:
          title: User Id
          type: integer
        project_id:
          title: Project Id
          type: integer
        role_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Role Id
        status:
          enum:
          - active
          - suspended
          maxLength: 9
          title: Status
          type: string
        created_at:
          format: date-time
          title: Created At
          type: string
          maxLength: 35
        user:
          $ref: '#/components/schemas/MemberUserResponses'
      required:
      - id
      - user_id
      - project_id
      - role_id
      - status
      - created_at
      - user
      title: ProjectMemberResponses
      type: object
    PublicInvitationResolveResponse:
      description: Public-facing response when resolving an invitation token.
      properties:
        invited_email:
          title: Invited Email
          type: string
        project_name:
          title: Project Name
          type: string
        inviter_name:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Inviter Name
        expires_at:
          anyOf:
          - format: date-time
            type: string
            maxLength: 35
          - type: 'null'
          default: null
          title: Expires At
        status:
          enum:
          - pending
          - accepted
          - declined
          - revoked
          title: Status
          type: string
          maxLength: 8
      required:
      - invited_email
      - project_name
      - status
      title: PublicInvitationResolveResponse
      type: object
    CurrentUserProfileResponses:
      description: API response shape for the current user's profile.
      properties:
        id:
          title: Id
          type: integer
        auth0_user_id:
          title: Auth0 User Id
          type: string
          maxLength: 255
        email:
          title: Email
          type: string
          maxLength: 254
        display_name:
          anyOf:
          - type: string
            maxLength: 100
          - type: 'null'
          title: Display Name
        email_verified:
          title: Email Verified
          type: boolean
      required:
      - id
      - auth0_user_id
      - email
      - display_name
      - email_verified
      title: CurrentUserProfileResponses
      type: object
    UpdateProfileRequest:
      description: Update display name, nickname, and/or profile picture.
      properties:
        display_name:
          anyOf:
          - maxLength: 100
            minLength: 1
            type: string
          - type: 'null'
          default: null
          title: Display Name
        nickname:
          anyOf:
          - maxLength: 100
            minLength: 1
            type: string
          - type: 'null'
          default: null
          title: Nickname
        picture:
          anyOf:
          - maxLength: 2048
            minLength: 1
            type: string
          - type: 'null'
          default: null
          title: Picture
      title: UpdateProfileRequest
      type: object
    ChangeEmailRequest:
      description: Request body for changing the account email address.
      properties:
        email:
          maxLength: 254
          minLength: 1
          title: Email
          type: string
      required:
      - email
      title: ChangeEmailRequest
      type: object
    ChangeUsernameRequest:
      description: Request body for changing the Auth0 username.
      properties:
        username:
          maxLength: 128
          minLength: 1
          pattern: ^[a-zA-Z0-9_.\-]+$
          title: Username
          type: string
      required:
      - username
      title: ChangeUsernameRequest
      type: object
    PasswordChangeTicketResponses:
      description: Hosted Auth0 password-change ticket URL.
      properties:
        ticket_url:
          maxLength: 2048
          title: Ticket Url
          type: string
      required:
      - ticket_url
      title: PasswordChangeTicketResponses
      type: object
    EmailVerificationCheckResponses:
      description: Result of a live, on-demand email verification check against Auth0.
      properties:
        email_verified:
          title: Email Verified
          type: boolean
      required:
      - email_verified
      title: EmailVerificationCheckResponses
      type: object
    ResolveSurveyAccessLinkTokenRequest:
      description: Request body for resolving a respondent survey access link token.
      properties:
        token:
          maxLength: 256
          minLength: 1
          title: Token
          type: string
      required:
      - token
      title: ResolveSurveyAccessLinkTokenRequest
      type: object
    SurveyAccessLinkResponse:
      description: API response shape for a survey access link.
      properties:
        id:
          format: uuid
          title: Id
          type: string
          maxLength: 36
        survey_id:
          title: Survey Id
          type: integer
        name:
          title: Name
          type: string
          maxLength: 120
        token:
          title: Token
          type: string
          maxLength: 256
        is_active:
          title: Is Active
          type: boolean
        link_type:
          enum:
          - general
          - private
          - authenticated
          title: Link Type
          type: string
          maxLength: 13
        assignment_source:
          enum:
          - manual
          - automated
          title: Assignment Source
          type: string
          maxLength: 9
        assigned_participant_id:
          anyOf:
          - format: uuid
            type: string
            maxLength: 36
          - type: 'null'
          title: Assigned Participant Id
        assigned_participant_email:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Assigned Participant Email
        expires_at:
          anyOf:
          - format: date-time
            type: string
            maxLength: 35
          - type: 'null'
          title: Expires At
        used_at:
          anyOf:
          - format: date-time
            type: string
            maxLength: 35
          - type: 'null'
          title: Used At
        emailed_at:
          anyOf:
          - format: date-time
            type: string
            maxLength: 35
          - type: 'null'
          title: Emailed At
        created_at:
          format: date-time
          title: Created At
          type: string
          maxLength: 35
      required:
      - id
      - survey_id
      - name
      - token
      - is_active
      - link_type
      - assignment_source
      - assigned_participant_id
      - expires_at
      - used_at
      - emailed_at
      - created_at
      title: SurveyAccessLinkResponse
      type: object
    SurveyResponses:
      description: API response shape for a survey.
      properties:
        id:
          title: Id
          type: integer
        project_id:
          title: Project Id
          type: integer
        title:
          title: Title
          type: string
          maxLength: 200
        visibility:
          enum:
          - private
          - link_only
          - public
          title: Visibility
          type: string
          maxLength: 9
        public_slug:
          anyOf:
          - type: string
            maxLength: 80
          - type: 'null'
          title: Public Slug
        default_response_store_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Default Response Store Id
        published_version_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Published Version Id
        created_by_user_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Created By User Id
        created_at:
          format: date-time
          title: Created At
          type: string
          maxLength: 35
        updated_at:
          format: date-time
          title: Updated At
          type: string
          maxLength: 35
      required:
      - id
      - project_id
      - title
      - visibility
      - public_slug
      - default_response_store_id
      - published_version_id
      - created_by_user_id
      - created_at
      - updated_at
      title: SurveyResponses
      type: object
    SurveyVersionResponses:
      description: API response shape for a survey version.
      properties:
        id:
          title: Id
          type: integer
        survey_id:
          title: Survey Id
          type: integer
        version_number:
          title: Version Number
          type: integer
        status:
          enum:
          - draft
          - published
          - archived
          title: Status
          type: string
          maxLength: 9
        compiled_schema:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Compiled Schema
        published_at:
          anyOf:
          - format: date-time
            type: string
            maxLength: 35
          - type: 'null'
          title: Published At
        created_by_user_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Created By User Id
        created_at:
          format: date-time
          title: Created At
          type: string
          maxLength: 35
        updated_at:
          format: date-time
          title: Updated At
          type: string
          maxLength: 35
      required:
      - id
      - survey_id
      - version_number
      - status
      - compiled_schema
      - published_at
      - created_by_user_id
      - created_at
      - updated_at
      title: SurveyVersionResponses
      type: object
    ResolveSurveyAccessLinkResponse:
      description: API response shape for resolving a respondent survey access link token.
      properties:
        link:
          $ref: '#/components/schemas/SurveyAccessLinkResponse'
        survey:
          anyOf:
          - $ref: '#/components/schemas/SurveyResponses'
          - type: 'null'
          default: null
        published_version:
          anyOf:
          - $ref: '#/components/schemas/SurveyVersionResponses'
          - type: 'null'
          default: null
      required:
      - link
      title: ResolveSurveyAccessLinkResponse
      type: object
    PaginatedPublicSurveysResponses:
      description: API response shape for a paginated list of public surveys.
      properties:
        items:
          items:
            $ref: '#/components/schemas/SurveyResponses'
          maxItems: 100
          title: Items
          type: array
        total:
          title: Total
          type: integer
        page:
          title: Page
          type: integer
        page_size:
          title: Page Size
          type: integer
      required:
      - items
      - total
      - page
      - page_size
      title: PaginatedPublicSurveysResponses
      type: object
    PublicSurveyResponses:
      description: API response shape for a publicly accessible survey with its published version.
      properties:
        survey:
          $ref: '#/components/schemas/SurveyResponses'
        published_version:
          anyOf:
          - $ref: '#/components/schemas/SurveyVersionResponses'
          - type: 'null'
          default: null
      required:
      - survey
      title: PublicSurveyResponses
      type: object
    LinkTokenAccess:
      additionalProperties: false
      description: Access descriptor for starting a respondent session from a private link token.
      properties:
        type:
          const: link_token
          title: Type
          type: string
          maxLength: 10
        token:
          maxLength: 256
          title: Token
          type: string
      required:
      - type
      - token
      title: LinkTokenAccess
      type: object
    PublicSlugAccess:
      additionalProperties: false
      description: Access descriptor for starting a respondent session from a public survey slug.
      properties:
        type:
          const: public_slug
          title: Type
          type: string
          maxLength: 11
        public_slug:
          maxLength: 80
          title: Public Slug
          type: string
      required:
      - type
      - public_slug
