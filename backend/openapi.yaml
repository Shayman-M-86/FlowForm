components:
  schemas:
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
          description: Machine-readable error code.
          maxLength: 128
        message:
          type: string
          description: Human-readable error message.
          maxLength: 1000
        details:
          type: object
          description: Optional structured extras. Pydantic validation errors place their per-field failures here as ``details.errors``.
          additionalProperties: true
    BootstrapUserRequest:
      description: Request body for post-auth user bootstrap.
      properties:
        id_token:
          maxLength: 8192
          minLength: 1
          title: Id Token
          type: string
      required:
      - id_token
      title: BootstrapUserRequest
      type: object
    CurrentUserResponses:
      description: API response shape for a bootstrapped user.
      properties:
        id:
          title: Id
          type: integer
        auth0_user_id:
          title: Auth0 User Id
          type: string
          maxLength: 255
        email:
          title: Email
          type: string
          maxLength: 254
        display_name:
          anyOf:
          - type: string
            maxLength: 100
          - type: 'null'
          title: Display Name
