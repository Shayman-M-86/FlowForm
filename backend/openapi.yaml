components:
  schemas:
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
          description: Machine-readable error code.
        message:
          type: string
          description: Human-readable error message.
        details:
          type: object
          description: Optional structured extras. Pydantic validation errors place their per-field failures here as ``details.errors``.
          additionalProperties: true
    BootstrapUserRequest:
      description: Request body for post-auth user bootstrap.
      properties:
        id_token:
          maxLength: 8192
          title: Id Token
          type: string
      required:
      - id_token
      title: BootstrapUserRequest
      type: object
    CurrentUserOut:
      description: API response shape for a bootstrapped user.
      properties:
        id:
          title: Id
          type: integer
        auth0_user_id:
          title: Auth0 User Id
          type: string
        email:
          title: Email
          type: string
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
      required:
      - id
      - auth0_user_id
      - email
      - display_name
      title: CurrentUserOut
      type: object
    ProjectOut:
      description: API response shape for a project.
      properties:
        id:
          title: Id
          type: integer
        name:
          title: Name
          type: string
        slug:
          title: Slug
          type: string
        created_by_user_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Created By User Id
        created_at:
          format: date-time
          title: Created At
          type: string
      required:
      - id
      - name
      - slug
      - created_by_user_id
      - created_at
      title: ProjectOut
      type: object
    BootstrapUserOut:
      description: API response shape for a bootstrap-user request.
      properties:
        created:
          title: Created
          type: boolean
        user:
          $ref: '#/components/schemas/CurrentUserOut'
        default_project:
          anyOf:
          - $ref: '#/components/schemas/ProjectOut'
          - type: 'null'
          default: null
      required:
      - created
      - user
      title: BootstrapUserOut
      type: object
    NodeOut:
      description: API response shape for a survey content node (question or rule).
      properties:
        id:
          title: Id
          type: integer
        survey_version_id:
          title: Survey Version Id
          type: integer
        question_key:
          title: Question Key
          type: string
        sort_key:
          title: Sort Key
          type: integer
        node_type:
          enum:
          - question
          - rule
          title: Node Type
          type: string
        question_schema:
          additionalProperties: true
          title: Question Schema
          type: object
        created_at:
          format: date-time
          title: Created At
          type: string
        updated_at:
          format: date-time
          title: Updated At
          type: string
      required:
      - id
      - survey_version_id
      - question_key
      - sort_key
      - node_type
      - question_schema
      - created_at
      - updated_at
      title: NodeOut
      type: object
    ChoiceConditionIn:
      additionalProperties: false
      description: Represents a condition block targeting a choice question.
      properties:
        target_id:
          maxLength: 128
          title: Target Id
          type: string
        family:
          const: choice
          title: Family
          type: string
        requirements:
          $ref: '#/components/schemas/ChoiceRequirementsIn'
      required:
      - target_id
      - family
      - requirements
      title: ChoiceConditionIn
      type: object
    ChoiceOptionIn:
      additionalProperties: false
