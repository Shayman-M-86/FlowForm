components:
  schemas:
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
          description: Machine-readable error code.
          maxLength: 128
        message:
          type: string
          description: Human-readable error message.
          maxLength: 1000
        details:
          type: object
          description: Optional structured extras. Pydantic validation errors place their per-field failures here as ``details.errors``.
          additionalProperties: true
    BootstrapUserRequest:
      description: Request body for post-auth user bootstrap.
      properties:
        id_token:
          maxLength: 8192
          minLength: 1
          title: Id Token
          type: string
      required:
      - id_token
      title: BootstrapUserRequest
      type: object
    CurrentUserResponses:
      description: API response shape for a bootstrapped user.
      properties:
        id:
          title: Id
          type: integer
        auth0_user_id:
          title: Auth0 User Id
          type: string
          maxLength: 255
        email:
          title: Email
          type: string
          maxLength: 254
        display_name:
          anyOf:
          - type: string
            maxLength: 100
          - type: 'null'
          title: Display Name
      required:
      - id
      - auth0_user_id
      - email
      - display_name
      title: CurrentUserResponses
      type: object
    ProjectResponses:
      description: API response shape for a project.
      properties:
        id:
          title: Id
          type: integer
        name:
          title: Name
          type: string
          maxLength: 100
        slug:
          title: Slug
          type: string
          maxLength: 80
        created_by_user_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Created By User Id
        created_at:
          format: date-time
          title: Created At
          type: string
          maxLength: 35
      required:
      - id
      - name
      - slug
      - created_by_user_id
      - created_at
      title: ProjectResponses
      type: object
    BootstrapUserResponses:
      description: API response shape for a bootstrap-user request.
      properties:
        created:
          title: Created
          type: boolean
        user:
          $ref: '#/components/schemas/CurrentUserResponses'
        default_project:
          anyOf:
          - $ref: '#/components/schemas/ProjectResponses'
          - type: 'null'
          default: null
      required:
      - created
      - user
      title: BootstrapUserResponses
      type: object
    CurrentUserProfileResponses:
      description: API response shape for the current user's profile.
      properties:
        id:
          title: Id
          type: integer
        auth0_user_id:
          title: Auth0 User Id
          type: string
          maxLength: 255
        email:
          title: Email
          type: string
          maxLength: 254
        display_name:
          anyOf:
          - type: string
            maxLength: 100
          - type: 'null'
          title: Display Name
        email_verified:
          title: Email Verified
          type: boolean
      required:
      - id
      - auth0_user_id
      - email
      - display_name
      - email_verified
      title: CurrentUserProfileResponses
      type: object
    UpdateProfileRequest:
      description: Update display name, nickname, and/or profile picture.
      properties:
        display_name:
          anyOf:
          - maxLength: 100
            minLength: 1
            type: string
          - type: 'null'
          default: null
          title: Display Name
        nickname:
          anyOf:
          - maxLength: 100
            minLength: 1
            type: string
          - type: 'null'
          default: null
          title: Nickname
        picture:
          anyOf:
          - maxLength: 2048
            minLength: 1
            type: string
          - type: 'null'
          default: null
          title: Picture
      title: UpdateProfileRequest
      type: object
    ChangeEmailRequest:
      description: Request body for changing the account email address.
      properties:
        email:
          maxLength: 254
          minLength: 1
          title: Email
          type: string
      required:
      - email
      title: ChangeEmailRequest
      type: object
    ChangeUsernameRequest:
      description: Request body for changing the Auth0 username.
      properties:
        username:
          maxLength: 128
          minLength: 1
          pattern: ^[a-zA-Z0-9_.\-]+$
          title: Username
          type: string
      required:
      - username
      title: ChangeUsernameRequest
      type: object
    PasswordChangeTicketResponses:
      description: Hosted Auth0 password-change ticket URL.
      properties:
        ticket_url:
          maxLength: 2048
          title: Ticket Url
          type: string
      required:
      - ticket_url
      title: PasswordChangeTicketResponses
      type: object
    ProjectInvitationResponses:
      description: API response shape for a project invitation.
      properties:
        id:
          title: Id
          type: integer
        project_id:
          title: Project Id
          type: integer
        project_name:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Project Name
        invited_email:
          maxLength: 254
          title: Invited Email
          type: string
        invite_message:
          anyOf:
          - maxLength: 500
            type: string
          - type: 'null'
          default: null
          title: Invite Message
        invited_by_user_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Invited By User Id
        invited_by_display:
          anyOf:
          - type: string
          - type: 'null'
          default: null
          title: Invited By Display
        role_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Role Id
        status:
          enum:
          - pending
          - accepted
          - declined
          - revoked
          maxLength: 8
          title: Status
          type: string
        expires_at:
          anyOf:
          - format: date-time
            type: string
            maxLength: 35
          - type: 'null'
          title: Expires At
        accepted_at:
          anyOf:
          - format: date-time
            type: string
            maxLength: 35
          - type: 'null'
          title: Accepted At
        created_at:
          format: date-time
          title: Created At
          type: string
          maxLength: 35
      required:
      - id
      - project_id
      - invited_email
      - invited_by_user_id
      - role_id
      - status
      - expires_at
      - accepted_at
      - created_at
      title: ProjectInvitationResponses
      type: object
    MemberUserResponses:
      description: Embedded user details on a project member response.
      properties:
        id:
          title: Id
          type: integer
        email:
          title: Email
          type: string
          maxLength: 254
        display_name:
          anyOf:
          - type: string
            maxLength: 100
          - type: 'null'
          title: Display Name
      required:
      - id
      - email
      - display_name
      title: MemberUserResponses
      type: object
    ProjectMemberResponses:
      description: API response shape for a project membership.
      properties:
        id:
          title: Id
          type: integer
        user_id:
          title: User Id
          type: integer
        project_id:
          title: Project Id
          type: integer
        role_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Role Id
        status:
          enum:
          - active
          - suspended
          maxLength: 9
          title: Status
          type: string
        created_at:
          format: date-time
          title: Created At
          type: string
          maxLength: 35
        user:
          $ref: '#/components/schemas/MemberUserResponses'
      required:
      - id
      - user_id
      - project_id
      - role_id
      - status
      - created_at
      - user
      title: ProjectMemberResponses
      type: object
    NodeResponses:
      description: API response shape for a survey content node (question or rule).
      properties:
        id:
          title: Id
          type: integer
        survey_version_id:
          title: Survey Version Id
          type: integer
        question_key:
          title: Question Key
          type: string
          maxLength: 128
        sort_key:
          title: Sort Key
          type: integer
        node_type:
          enum:
          - question
          - rule
          title: Node Type
          type: string
          maxLength: 8
        question_schema:
          additionalProperties: true
          title: Question Schema
          type: object
        created_at:
          format: date-time
          title: Created At
          type: string
          maxLength: 35
        updated_at:
          format: date-time
          title: Updated At
          type: string
          maxLength: 35
      required:
      - id
      - survey_version_id
      - question_key
      - sort_key
      - node_type
      - question_schema
      - created_at
      - updated_at
      title: NodeResponses
      type: object
    ChoiceConditionIn:
      additionalProperties: false
      description: Represents a condition block targeting a choice question.
      properties:
        target_id:
          maxLength: 128
          minLength: 1
          title: Target Id
          type: string
        family:
          const: choice
          title: Family
          type: string
          maxLength: 6
        requirements:
          $ref: '#/components/schemas/ChoiceRequirementsIn'
      required:
      - target_id
      - family
      - requirements
      title: ChoiceConditionIn
      type: object
    ChoiceDefinitionIn:
      additionalProperties: false
      description: definition block for a choice question.
      properties:
        min:
          minimum: 0
          title: Min
          type: integer
        max:
          minimum: 1
          title: Max
          type: integer
        options:
          items:
            $ref: '#/components/schemas/ChoiceOptionIn'
          maxItems: 10
          title: Options
          type: array
      required:
      - min
      - max
      - options
      title: ChoiceDefinitionIn
      type: object
    ChoiceOptionIn:
      additionalProperties: false
      description: A single selectable option for a choice question.
      properties:
        id:
          maxLength: 128
          minLength: 1
          title: Id
          type: string
        label:
          maxLength: 1000
          minLength: 1
          title: Label
          type: string
      required:
      - id
      - label
      title: ChoiceOptionIn
      type: object
    ChoiceQuestionSchemaIn:
      additionalProperties: false
      description: Incoming choice-question content schema.
      properties:
        id:
          maxLength: 128
          minLength: 1
          title: Id
          type: string
        family:
          const: choice
          title: Family
          type: string
          maxLength: 6
        label:
          maxLength: 5000
          minLength: 1
          title: Label
          type: string
        title:
          anyOf:
          - maxLength: 500
            minLength: 1
            type: string
          - type: 'null'
          default: null
          title: Title
        definition:
          $ref: '#/components/schemas/ChoiceDefinitionIn'
      required:
      - id
      - family
      - label
      - definition
      title: ChoiceQuestionSchemaIn
      type: object
    ChoiceRequirementsIn:
      additionalProperties: false
      description: Validation requirements for a choice-question condition.
      properties:
        required:
          anyOf:
          - items:
              maxLength: 128
              minLength: 1
              type: string
            maxItems: 50
            type: array
          - type: 'null'
          default: null
          title: Required
        forbidden:
          anyOf:
          - items:
              maxLength: 128
              minLength: 1
              type: string
            maxItems: 50
            type: array
          - type: 'null'
          default: null
          title: Forbidden
        any_of:
          anyOf:
          - items:
              maxLength: 128
              minLength: 1
              type: string
            maxItems: 50
            type: array
          - type: 'null'
          default: null
          title: Any Of
      title: ChoiceRequirementsIn
      type: object
    CreateQuestionNodeRequest:
      additionalProperties: false
      description: Validates requests that create a new question node.
      properties:
        type:
          const: question
          title: Type
          type: string
          maxLength: 8
        sort_key:
          exclusiveMinimum: 0
          title: Sort Key
          type: integer
        content:
          discriminator:
            mapping:
              choice: '#/components/schemas/ChoiceQuestionSchemaIn'
              field: '#/components/schemas/FieldQuestionSchemaIn'
              matching: '#/components/schemas/MatchingQuestionSchemaIn'
              rating: '#/components/schemas/RatingQuestionSchemaIn'
            propertyName: family
          oneOf:
          - $ref: '#/components/schemas/ChoiceQuestionSchemaIn'
          - $ref: '#/components/schemas/FieldQuestionSchemaIn'
          - $ref: '#/components/schemas/MatchingQuestionSchemaIn'
          - $ref: '#/components/schemas/RatingQuestionSchemaIn'
          title: Content
      required:
      - type
      - sort_key
      - content
      title: CreateQuestionNodeRequest
      type: object
    CreateRuleNodeRequest:
      additionalProperties: false
      description: Validates requests that create a new rule node.
      properties:
        type:
          const: rule
          title: Type
          type: string
          maxLength: 4
        sort_key:
          exclusiveMinimum: 0
          title: Sort Key
          type: integer
        content:
          $ref: '#/components/schemas/RuleSchemaIn'
      required:
      - type
      - sort_key
      - content
      title: CreateRuleNodeRequest
      type: object
    DateFieldRequirementsIn:
      additionalProperties: false
      description: Validation requirements for a date field-question condition.
      properties:
        type:
          const: date
          title: Type
          type: string
          maxLength: 4
        operator:
          enum:
          - before
          - after
          title: Operator
          type: string
          maxLength: 6
        value:
          maxLength: 10
          title: Value
          type: string
      required:
      - type
      - operator
      - value
      title: DateFieldRequirementsIn
      type: object
    ElseDoIn:
      additionalProperties: false
      description: Represents the single navigation action performed by an else block.
      properties:
        skip_to:
          anyOf:
          - maxLength: 128
            minLength: 1
            type: string
          - type: 'null'
          default: null
          title: Skip To
        end_and_submit:
          anyOf:
          - type: boolean
          - type: 'null'
          default: null
          title: End And Submit
        end_and_discard:
          anyOf:
          - type: boolean
          - type: 'null'
          default: null
          title: End And Discard
      title: ElseDoIn
      type: object
    FieldConditionIn:
      additionalProperties: false
      description: Represents a condition block targeting a field question.
      properties:
        target_id:
          maxLength: 128
          minLength: 1
          title: Target Id
          type: string
        family:
          const: field
          title: Family
          type: string
          maxLength: 5
        requirements:
          anyOf:
          - $ref: '#/components/schemas/NumberFieldRequirementsIn'
          - $ref: '#/components/schemas/DateFieldRequirementsIn'
          title: Requirements
      required:
      - target_id
      - family
      - requirements
      title: FieldConditionIn
      type: object
    FieldDefinitionIn:
      additionalProperties: false
      description: definition block for a field question.
      properties:
        field_type:
          enum:
          - short_text
          - long_text
          - email
          - number
          - date
          - phone
          title: Field Type
          type: string
          maxLength: 10
        ui:
          $ref: '#/components/schemas/FieldUIIn'
      required:
      - field_type
      title: FieldDefinitionIn
      type: object
    FieldQuestionSchemaIn:
      additionalProperties: false
      description: Incoming field-question content schema.
      properties:
        id:
          maxLength: 128
          minLength: 1
          title: Id
          type: string
        family:
          const: field
          title: Family
          type: string
          maxLength: 5
        label:
          maxLength: 5000
          minLength: 1
          title: Label
          type: string
        title:
          anyOf:
          - maxLength: 500
            minLength: 1
            type: string
          - type: 'null'
          default: null
          title: Title
        definition:
          $ref: '#/components/schemas/FieldDefinitionIn'
      required:
      - id
      - family
      - label
      - definition
      title: FieldQuestionSchemaIn
      type: object
    FieldUIIn:
      additionalProperties: false
      description: UI block for a field question.
      properties:
        placeholder:
          default: ''
          maxLength: 50
          title: Placeholder
          type: string
      title: FieldUIIn
      type: object
    MatchingConditionIn:
      additionalProperties: false
      description: Represents a condition block targeting a matching question.
      properties:
        target_id:
          maxLength: 128
          minLength: 1
          title: Target Id
          type: string
        family:
          const: matching
          title: Family
          type: string
          maxLength: 8
        requirements:
          $ref: '#/components/schemas/MatchingRequirementsIn'
      required:
      - target_id
      - family
      - requirements
      title: MatchingConditionIn
      type: object
    MatchingDefinitionIn:
      additionalProperties: false
      description: definition block for a matching question.
      properties:
        prompts:
          items:
            $ref: '#/components/schemas/MatchingItemIn'
          maxItems: 10
          title: Prompts
          type: array
