applications:
  - appRoot: frontend/apps/public-site
    customHeaders:
      - pattern: /_astro/*
        headers:
          - key: Cache-Control
            value: public, max-age=31536000, immutable
      - pattern: "**/*.woff2"
        headers:
          - key: Cache-Control
            value: public, max-age=31536000, immutable
      - pattern: "**/*.woff"
        headers:
          - key: Cache-Control
            value: public, max-age=31536000, immutable
      - pattern: "**/*.png"
        headers:
          - key: Cache-Control
            value: public, max-age=86400, stale-while-revalidate=604800
      - pattern: "**/*.jpg"
        headers:
          - key: Cache-Control
            value: public, max-age=86400, stale-while-revalidate=604800
      - pattern: "**/*.jpeg"
        headers:
          - key: Cache-Control
            value: public, max-age=86400, stale-while-revalidate=604800
      - pattern: "**/*.gif"
        headers:
          - key: Cache-Control
            value: public, max-age=86400, stale-while-revalidate=604800
      - pattern: "**/*.webp"
        headers:
          - key: Cache-Control
            value: public, max-age=86400, stale-while-revalidate=604800
      - pattern: "**/*.svg"
        headers:
          - key: Cache-Control
            value: public, max-age=86400, stale-while-revalidate=604800
      - pattern: "**/*.ico"
        headers:
          - key: Cache-Control
            value: public, max-age=86400, stale-while-revalidate=604800

