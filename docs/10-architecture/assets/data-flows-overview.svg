<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#57606a"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0969da"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a7f37"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="980" height="560" rx="12" fill="#f6f8fa" stroke="#d0d7de"/>

  <!-- title -->
  <text x="32" y="44" font-size="21" font-weight="700" fill="#1f2328">FlowForm data flows at a glance</text>
  <text x="32" y="68" font-size="13" fill="#57606a">Two client surfaces, one backend, two databases linked only by derived opaque locators</text>

  <!-- ===== clients column ===== -->
  <text x="60" y="112" font-size="12" font-weight="600" fill="#57606a" letter-spacing="1">CLIENTS</text>

  <rect x="40" y="126" width="190" height="72" rx="8" fill="#ddf4ff" stroke="#0969da"/>
  <text x="135" y="156" font-size="14" font-weight="600" fill="#0a3069" text-anchor="middle">Studio user</text>
  <text x="135" y="176" font-size="11.5" fill="#0a3069" text-anchor="middle">author · publish · results</text>

  <rect x="40" y="330" width="190" height="72" rx="8" fill="#dafbe1" stroke="#1a7f37"/>
  <text x="135" y="360" font-size="14" font-weight="600" fill="#116329" text-anchor="middle">Respondent browser</text>
  <text x="135" y="380" font-size="11.5" fill="#116329" text-anchor="middle">start · answer · complete</text>

  <!-- ===== backend container ===== -->
  <rect x="320" y="100" width="290" height="380" rx="10" fill="#ffffff" stroke="#8c959f" stroke-dasharray="none"/>
  <text x="465" y="128" font-size="13" font-weight="700" fill="#1f2328" text-anchor="middle">Flask backend</text>

  <rect x="345" y="146" width="240" height="58" rx="8" fill="#ddf4ff" stroke="#0969da"/>
  <text x="465" y="171" font-size="13" font-weight="600" fill="#0a3069" text-anchor="middle">Studio endpoints</text>
  <text x="465" y="189" font-size="11" fill="#0a3069" text-anchor="middle">access checks · survey service · results</text>

  <rect x="345" y="330" width="240" height="58" rx="8" fill="#dafbe1" stroke="#1a7f37"/>
  <text x="465" y="355" font-size="13" font-weight="600" fill="#116329" text-anchor="middle">Respondent endpoints</text>
  <text x="465" y="373" font-size="11" fill="#116329" text-anchor="middle">access + subject resolution · sessions</text>

  <rect x="345" y="410" width="240" height="52" rx="8" fill="#fbefff" stroke="#8250df"/>
  <text x="465" y="432" font-size="13" font-weight="600" fill="#512a97" text-anchor="middle">Crypto + locator derivation</text>
  <text x="465" y="450" font-size="11" fill="#512a97" text-anchor="middle">encrypt / decrypt · derive opaque locators</text>

  <!-- ===== databases column ===== -->
  <text x="720" y="112" font-size="12" font-weight="600" fill="#57606a" letter-spacing="1">DATA</text>

  <!-- core db cylinder -->
  <path d="M 700 150 a 110 16 0 0 1 220 0 v 66 a 110 16 0 0 1 -220 0 z" fill="#fff8c5" stroke="#9a6700"/>
  <ellipse cx="810" cy="150" rx="110" ry="16" fill="#fff1a8" stroke="#9a6700"/>
  <text x="810" y="192" font-size="14" font-weight="600" fill="#7d4e00" text-anchor="middle">Core database</text>
  <text x="810" y="212" font-size="11" fill="#7d4e00" text-anchor="middle">surveys · sessions · slots · events</text>

  <!-- response db cylinder -->
  <path d="M 700 352 a 110 16 0 0 1 220 0 v 66 a 110 16 0 0 1 -220 0 z" fill="#ffebe9" stroke="#cf222e"/>
  <ellipse cx="810" cy="352" rx="110" ry="16" fill="#ffddda" stroke="#cf222e"/>
  <text x="810" y="394" font-size="14" font-weight="600" fill="#a40e26" text-anchor="middle">Response database</text>
  <text x="810" y="414" font-size="11" fill="#a40e26" text-anchor="middle">encrypted envelopes · ciphertext only</text>

  <!-- ===== arrows ===== -->
  <!-- studio -> studio endpoints -->
  <line x1="230" y1="166" x2="340" y2="172" stroke="#0969da" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <!-- respondent -> respondent endpoints -->
  <line x1="230" y1="364" x2="340" y2="360" stroke="#1a7f37" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- studio endpoints -> core -->
  <line x1="585" y1="172" x2="695" y2="180" stroke="#0969da" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <!-- respondent endpoints -> core -->
  <line x1="585" y1="338" x2="700" y2="222" stroke="#1a7f37" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <!-- respondent endpoints -> crypto -->
  <line x1="465" y1="388" x2="465" y2="405" stroke="#1a7f37" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <!-- studio endpoints -> crypto (results decryption, drawn along inside edge) -->
  <path d="M 352 204 C 330 280, 330 360, 352 428" fill="none" stroke="#0969da" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrowBlue)"/>
  <!-- crypto -> response db -->
  <line x1="585" y1="436" x2="720 " y2="420" stroke="#8250df" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- locator link between DBs -->
  <line x1="810" y1="234" x2="810" y2="334" stroke="#bc4c00" stroke-width="2" stroke-dasharray="6 5"/>
  <rect x="690" y="266" width="240" height="38" rx="6" fill="#fff1e5" stroke="#bc4c00"/>
  <text x="810" y="282" font-size="11" font-weight="600" fill="#873800" text-anchor="middle">linked only by derived opaque locators</text>
  <text x="810" y="297" font-size="11" fill="#873800" text-anchor="middle">no cross-database SQL foreign keys</text>

  <!-- legend -->
  <line x1="40" y1="510" x2="70" y2="510" stroke="#0969da" stroke-width="2"/>
  <text x="78" y="514" font-size="11.5" fill="#57606a">management flows (authoring, publication, results)</text>
  <line x1="380" y1="510" x2="410" y2="510" stroke="#1a7f37" stroke-width="2"/>
  <text x="418" y="514" font-size="11.5" fill="#57606a">respondent flows (entry, answers, completion)</text>
  <line x1="700" y1="510" x2="730" y2="510" stroke="#0969da" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="738" y="514" font-size="11.5" fill="#57606a">server-side decryption for results</text>
</svg>
