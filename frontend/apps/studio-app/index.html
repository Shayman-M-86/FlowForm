<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/FlowForm_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlowForm Studio</title>


    <!-- Preload Geist latin subset fonts to prevent layout shift -->
    <link rel="preload" href="/fonts/gyByhwUxId8gMEwcGFU.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/or3nQ6H-1_WfwkMZI_qYFrcdmg.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Apply theme before first paint to avoid flash -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('flowform.theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = stored === 'dark' || (!stored && prefersDark);
          if (dark) document.documentElement.classList.add('dark');
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
