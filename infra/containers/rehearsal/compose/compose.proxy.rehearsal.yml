# Rehearsal proxy compose OVERRIDE — layered on top of the prod proxy compose:
#
#   docker compose -f infra/containers/deployment/compose/compose.proxy.yml \
#                  -f infra/containers/rehearsal/compose/compose.proxy.rehearsal.yml up -d
#
# It exists so the rehearsal can run the REAL prod proxy stack while swapping ONLY
# the two config files that can't work on the offline private net:
#   - caddy   : rehearsal Caddyfile.proxy (tls internal, not Route 53 DNS-01)
#   - squid   : rehearsal allow-list (admits *.localstack.test, not real AWS)
# The prod compose + prod config files are NOT modified. Everything else (images,
# hardening, ports, env) comes from the base file unchanged.
#
# bootstrap-proxy.sh consumes this via the COMPOSE_FILE env seam (see the proxy
# cloud-init), which docker compose reads as a ':'-separated list of -f files.
#
# PATH RESOLUTION FOOTGUN: docker compose resolves relative bind-mount paths in
# ALL files against the PROJECT DIRECTORY, which is the dir of the FIRST -f file
# — here infra/containers/deployment/compose/ (the shared base). So the override
# paths below are written relative to infra/containers/deployment/compose/, not
# relative to this file.

name: flowform-proxy

services:
  caddy:
    volumes:
      # replace the prod Route53 Caddyfile with the rehearsal tls-internal one.
      # path is relative to the PROJECT dir (infra/containers/deployment/compose/)
      - ../../rehearsal/services/caddy/Caddyfile.proxy:/etc/caddy/Caddyfile:ro

  squid:
    volumes:
      - ../services/squid/squid.conf:/etc/squid/squid.conf.template:ro
      # replace the prod allow-list with the rehearsal one (*.localstack.test).
      - ../../rehearsal/services/squid/allowed-domains.txt:/etc/squid/allowed-domains.txt:ro
      - squid_logs:/var/log/squid

volumes:
  squid_logs:
