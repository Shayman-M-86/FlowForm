# Private image registry for the rehearsal — fake ECR.
#
# This file is the runtime source rendered into cloud-init. The Proxmox fixture
# build reads only its image reference and preloads that image; registry data,
# service units, networking, and startup remain runtime concerns.
#
# Runs on the aws-fixtures-vm (230, 10.10.10.30) ALONGSIDE LocalStack + the TLS
# shim — the box that hosts every always-on fake-AWS backend:
#   :4566  LocalStack  (Secrets Manager / SSM / KMS)
#   :443   TLS shim    (*.localstack.test → LocalStack)
#   :5000  registry    (fake ECR — the backend image)
#
# This stands in for ECR/image delivery, NOT for proxy/egress behaviour — the
# proxy box (210) is egress-only (Squid + TLS shim path). Keeping the registry
# here (not on the proxy) keeps that boundary clean, and here it is always-on
# during isolation runs (unlike the toggleable dev box).
#
# Plain HTTP on :5000. The private VMs that pull/push must trust it as an
# "insecure registry" via /etc/docker/daemon.json — set by cloud-init on the app
# box (pulls) and the dev box (builds + pushes). Mirrors how the real app box
# pulls BACKEND_IMAGE from ECR and never from the internet.

services:
  registry:
    image: registry:2
    container_name: flowform-registry
    restart: unless-stopped
    ports:
      - "10.10.10.30:5000:5000"   # bind the private NIC so offline VMs can reach it
    environment:
      - REGISTRY_STORAGE_DELETE_ENABLED=true
    volumes:
      - registry-data:/var/lib/registry

volumes:
  registry-data:
