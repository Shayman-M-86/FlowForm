http_port 3128

# Rendered by proxy.yml. The second source is disabled with a loopback sentinel
# outside rehearsal; rehearsal enables it only for VM 240's bootstrap fetch.
acl runtime_clients src __APP_SOURCE_CIDR__ __DB_BOOTSTRAP_SOURCE_CIDR__
acl SSL_ports port 443
acl CONNECT method CONNECT
acl allowed_domains dstdomain "/etc/squid/allowed-domains.txt"

http_access deny !runtime_clients
http_access deny CONNECT !SSL_ports
http_access allow runtime_clients CONNECT allowed_domains
http_access deny all

cache deny all

via off
forwarded_for delete
request_header_access X-Forwarded-For deny all
request_header_access Via deny all

# Keep the file sink for the live verification harness, which reads this path
# as Squid's unprivileged runtime uid. The container entrypoint tails this same
# file to stdout so Docker's log driver and the proxy Alloy agent ship it.
logformat flowform_access level=info %ts.%03tu %6tr %>a %Ss/%03>Hs %<st %rm %ru %[un %Sh/%<a %mt
access_log stdio:/var/log/squid/access.log flowform_access
