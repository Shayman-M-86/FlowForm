name: flowform

services:
  postgres-core:
    image: postgres:17
    container_name: flowform-postgres-core
    env_file:
      - ../../../../env/dev/.db.core.env
    environment:
      DATABASE_INIT_TARGET: core

      POSTGRES_USER: ${DATABASE_CORE_INIT_USER}
      POSTGRES_DB: ${DATABASE_CORE_INIT_DB}
      POSTGRES_PASSWORD_FILE: /run/secrets/DATABASE_CORE_INIT_PASSWORD

      DATABASE_CORE_APP_PASSWORD_FILE: /run/secrets/DATABASE_CORE_APP_PASSWORD

    command: [
      "postgres", 
      "-c", "password_encryption=scram-sha-256", 
      "-c", "hba_file=/etc/postgresql/pg_hba.conf", 
      "-c", "listen_addresses=*", 
      "-c", "port=${DATABASE_CORE_PORT}"
      ]
    ports:
      - "127.0.0.1:5432:${DATABASE_CORE_PORT}"
    volumes:
      - flowform_postgres_core_data:/var/lib/postgresql/data
      - ../../../../database/init:/docker-entrypoint-initdb.d
      - ../../../../database/config/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ${FLOWFORM_SECRET_DIR:-../../../../env/dev/secrets}:/run/secrets:ro
    networks:
      - flowform_net_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_CORE_INIT_USER} -d ${DATABASE_CORE_INIT_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-response:
    image: postgres:17
    container_name: flowform-postgres-response
    env_file:
      - ../../../../env/dev/.db.response.env
    environment:
      DATABASE_INIT_TARGET: response

      POSTGRES_USER: ${DATABASE_RESPONSE_INIT_USER}
      POSTGRES_DB: ${DATABASE_RESPONSE_INIT_DB}
      POSTGRES_PASSWORD_FILE: /run/secrets/DATABASE_RESPONSE_INIT_PASSWORD

      DATABASE_RESPONSE_APP_PASSWORD_FILE: /run/secrets/DATABASE_RESPONSE_APP_PASSWORD
    command: [
      "postgres", 
      "-c", "password_encryption=scram-sha-256", 
      "-c", "hba_file=/etc/postgresql/pg_hba.conf", 
      "-c", "listen_addresses=*", 
      "-c", "port=${DATABASE_RESPONSE_PORT}"
      ]
    ports:
      - "127.0.0.1:5433:${DATABASE_RESPONSE_PORT}"
    volumes:
      - flowform_postgres_response_data:/var/lib/postgresql/data
      - ../../../../database/init:/docker-entrypoint-initdb.d
      - ../../../../database/config/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ${FLOWFORM_SECRET_DIR:-../../../../env/dev/secrets}:/run/secrets:ro
    networks:
      - flowform_net_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_RESPONSE_INIT_USER} -d ${DATABASE_RESPONSE_INIT_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../../../../..
      dockerfile: infra/containers/images/backend/backend.Dockerfile
      args:
        UV_SYNC_FLAGS: "--extra dev"
    container_name: flowform-backend
    env_file:
      - ../../../../env/dev/.backend.env
      - ../../../../env/dev/.db.core.env
      - ../../../../env/dev/.db.response.env
    environment:
      PYTHONUNBUFFERED: "1"
      FLOWFORM_ENV: dev
      # AWS credentials come from `aws login` (browser sign-in, no stored
      # access keys): run `aws login --profile flowform-dev` on the host,
      # then boto3 reads and auto-refreshes the temporary credentials via
      # the mounts below. Sessions last up to 12h — re-run `aws login`
      # when they expire. Fallback if login creds misbehave:
      # scripts/dev/aws-dev-session.sh. On EC2 the same code path uses
      # the instance role instead.
      AWS_PROFILE: ${AWS_PROFILE:-flowform-dev}
      DATABASE_CORE_PORT: ${DATABASE_CORE_PORT}
      DATABASE_RESPONSE_PORT: ${DATABASE_RESPONSE_PORT}

      DATABASE_CORE_APP_PASSWORD_FILE: /run/secrets/DATABASE_CORE_APP_PASSWORD
      DATABASE_RESPONSE_APP_PASSWORD_FILE: /run/secrets/DATABASE_RESPONSE_APP_PASSWORD

      FLOWFORM_APP_SECRET_KEY_FILE: /run/secrets/FLOWFORM_APP_SECRET_KEY
      FLOWFORM_AUTH0_MGMT_SECRET_FILE: /run/secrets/FLOWFORM_AUTH0_MGMT_SECRET
    command: uv run flask --debug run --host 0.0.0.0 --port 5000
    volumes:
      - ../../../../../backend:/app
      - ../../../../../backend/logs:/app/logs
      - flowform_backend_dev_venv:/opt/flowform/backend-venv
      # `aws login` credentials for boto3 (container runs as root, so it
      # looks in /root/.aws). Only the profile config and the login token
      # cache are mounted — never ~/.aws/credentials, so no static key
      # can leak into the container even if one exists on the host. The
      # cache is writable because boto3 refreshes the ~15-min credentials
      # in place.
      - ~/.aws/config:/root/.aws/config:ro
      - ~/.aws/login/cache:/root/.aws/login/cache
      - ${FLOWFORM_SECRET_DIR:-../../../../env/dev/secrets}:/run/secrets:ro
    ports:
      - "5000:5000"
    depends_on:
      postgres-core:
        condition: service_healthy
      postgres-response:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - /app/scripts/healthcheck.py
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - flowform_net_dev

volumes:
  flowform_postgres_core_data:
  flowform_postgres_response_data:
  flowform_backend_dev_venv:

networks:
  flowform_net_dev:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16


# Run scripts/secrets/fetch-dev-secrets.sh and set
# FLOWFORM_SECRET_DIR="$XDG_RUNTIME_DIR/flowform-secrets" (export it from
# your shell rc). The script assembles everything there: app secret key +
# Auth0 mgmt secret fetched from Secrets Manager, the four local-Postgres
# passwords generated on this machine (scripts/secrets/generate-secrets.sh)
# — dev-only throwaways that are never uploaded. The complete directory is
# mounted read-only at /run/secrets instead of using Compose's per-file secret
# mounts. Docker Desktop otherwise creates a separate WSL bind proxy for every
# file, which can retain the wrong file/directory type after secrets refresh.
