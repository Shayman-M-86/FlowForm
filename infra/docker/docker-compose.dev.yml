name: flowform

services:
  postgres-core:
    image: postgres:17
    container_name: flowform-postgres-core
    env_file:
      - ./.db.core.env
    environment:
      DATABASE_INIT_TARGET: core

      POSTGRES_USER: ${DATABASE_CORE_INIT_USER}
      POSTGRES_DB: ${DATABASE_CORE_INIT_DB}
      POSTGRES_PASSWORD_FILE: /run/secrets/DATABASE_CORE_INIT_PASSWORD

      DATABASE_CORE_APP_PASSWORD_FILE: /run/secrets/DATABASE_CORE_APP_PASSWORD
    command: [
      "postgres", 
      "-c", "password_encryption=scram-sha-256", 
      "-c", "hba_file=/etc/postgresql/pg_hba.conf", 
      "-c", "listen_addresses=*", 
      "-c", "port=${DATABASE_CORE_PORT}"
      ]
    ports:
      - "127.0.0.1:5432:${DATABASE_CORE_PORT}"
    volumes:
      - flowform_postgres_core_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d
      - ../postgres/config/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    secrets:
      - DATABASE_CORE_INIT_PASSWORD
      - DATABASE_CORE_APP_PASSWORD
    networks:
      - flowform_net_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_CORE_INIT_USER} -d ${DATABASE_CORE_INIT_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-response:
    image: postgres:17
    container_name: flowform-postgres-response
    env_file:
      - ./.db.response.env
    environment:
      DATABASE_INIT_TARGET: response

      POSTGRES_USER: ${DATABASE_RESPONSE_INIT_USER}
      POSTGRES_DB: ${DATABASE_RESPONSE_INIT_DB}
      POSTGRES_PASSWORD_FILE: /run/secrets/DATABASE_RESPONSE_INIT_PASSWORD

      DATABASE_RESPONSE_APP_PASSWORD_FILE: /run/secrets/DATABASE_RESPONSE_APP_PASSWORD
    command: [
      "postgres", 
      "-c", "password_encryption=scram-sha-256", 
      "-c", "hba_file=/etc/postgresql/pg_hba.conf", 
      "-c", "listen_addresses=*", 
      "-c", "port=${DATABASE_RESPONSE_PORT}"
      ]
    ports:
      - "127.0.0.1:5433:${DATABASE_RESPONSE_PORT}"
    volumes:
      - flowform_postgres_response_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d
      - ../postgres/config/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    secrets:
      - DATABASE_RESPONSE_INIT_PASSWORD
      - DATABASE_RESPONSE_APP_PASSWORD
    networks:
      - flowform_net_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_RESPONSE_INIT_USER} -d ${DATABASE_RESPONSE_INIT_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    container_name: flowform-backend
    env_file:
      - ./.backend.env
      - ./.db.core.env
      - ./.db.response.env
    environment:
      PYTHONUNBUFFERED: "1"
      FLOWFORM_ENV: dev
      DATABASE_CORE_PORT: ${DATABASE_CORE_PORT}
      DATABASE_RESPONSE_PORT: ${DATABASE_RESPONSE_PORT}

      DATABASE_CORE_APP_PASSWORD_FILE: /run/secrets/DATABASE_CORE_APP_PASSWORD
      DATABASE_RESPONSE_APP_PASSWORD_FILE: /run/secrets/DATABASE_RESPONSE_APP_PASSWORD

      FLOWFORM_APP_SECRET_KEY_FILE: /run/secrets/FLOWFORM_APP_SECRET_KEY
    command: uv run flask --debug run --host 0.0.0.0 --port 5000
    volumes:
      - ../../backend:/app
      - ../../backend/logs:/app/logs
    ports:
      - "5000:5000"
    depends_on:
      postgres-core:
        condition: service_healthy
      postgres-response:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - /app/scripts/healthcheck.py
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    secrets:
      - DATABASE_CORE_APP_PASSWORD
      - DATABASE_RESPONSE_APP_PASSWORD
      - FLOWFORM_APP_SECRET_KEY
    networks:
      - flowform_net_dev

volumes:
  flowform_postgres_core_data:
  flowform_postgres_response_data:

networks:
  flowform_net_dev:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16


secrets:
  DATABASE_CORE_INIT_PASSWORD:
    file: ${FLOWFORM_SECRET_DIR:-./secrets}/DATABASE_CORE_INIT_PASSWORD.dev.secret.txt
  DATABASE_CORE_APP_PASSWORD:
    file: ${FLOWFORM_SECRET_DIR:-./secrets}/DATABASE_CORE_APP_PASSWORD.dev.secret.txt
  DATABASE_RESPONSE_INIT_PASSWORD:
    file: ${FLOWFORM_SECRET_DIR:-./secrets}/DATABASE_RESPONSE_INIT_PASSWORD.dev.secret.txt
  DATABASE_RESPONSE_APP_PASSWORD:
    file: ${FLOWFORM_SECRET_DIR:-./secrets}/DATABASE_RESPONSE_APP_PASSWORD.dev.secret.txt
  FLOWFORM_APP_SECRET_KEY:
    file: ${FLOWFORM_SECRET_DIR:-./secrets}/FLOWFORM_APP_SECRET_KEY.dev.secret.txt
