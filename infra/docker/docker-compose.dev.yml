services:
  backend:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    container_name: flowform-backend
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      FLOWFORM_ENV: dev
      PYTHONUNBUFFERED: "1"
    command: uv run flask --debug run --host 0.0.0.0 --port 5000
    volumes:
      - ../../backend:/app
      - ../../backend/logs:/app/logs
    ports:
      - "5000:5000"

