name: flowform

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

      FLOWFORM_CORE_DB: ${FLOWFORM_CORE_DB}
      FLOWFORM_RESPONSE_DB: ${FLOWFORM_RESPONSE_DB}

      FLOWFORM_CORE_APP_USER: ${FLOWFORM_CORE_APP_USER}
      FLOWFORM_CORE_APP_PASSWORD: ${FLOWFORM_CORE_APP_PASSWORD}

      FLOWFORM_RESPONSE_APP_USER: ${FLOWFORM_RESPONSE_APP_USER}
      FLOWFORM_RESPONSE_APP_PASSWORD: ${FLOWFORM_RESPONSE_APP_PASSWORD}

      FLOWFORM_CORE_SCHEMA_FILE: ${FLOWFORM_CORE_SCHEMA_FILE}
      FLOWFORM_RESPONSE_SCHEMA_FILE: ${FLOWFORM_RESPONSE_SCHEMA_FILE}
    command:
      - postgres
      - -c
      - password_encryption=scram-sha-256 # Use SCRAM-SHA-256 for password encryption
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf # Use custom pg_hba.conf for authentication
      - -c
      - listen_addresses=* # Listen on all interfaces
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - flowform_postgres_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d
      - ../postgres/config/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    networks:
      - flowform_net

volumes:
  flowform_postgres_data:

networks:
  flowform_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16