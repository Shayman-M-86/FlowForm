name: flowform-test-Environment

services:
  postgres-core:
    image: postgres:17
    container_name: flowform-postgres-core-test
    environment:
      FF_PGDB_INIT__TARGET: core
      POSTGRES_USER: ${FF_PGDB_INIT__USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/FF_PGDB_INIT__PASSWORD
      POSTGRES_DB: ${FF_PGDB_CORE__DB_NAME}

      FF_PGDB_CORE__DB_NAME: ${FF_PGDB_CORE__DB_NAME}
      FF_PGDB_CORE__APP_USER: ${FF_PGDB_CORE__APP_USER}
      FF_PGDB_CORE__APP_PASSWORD_FILE: /run/secrets/FF_PGDB_CORE__APP_PASSWORD
      FF_PGDB_CORE__SCHEMA_FILE: ${FF_PGDB_CORE__SCHEMA_FILE}
    ports:
      - "127.0.0.1:${FF_PGDB_CORE_COMPOSE__PUBLISHED_PORT:-5432}:${FF_PGDB_CORE_COMPOSE__PORT:-5432}"
    command:
      - postgres
      - -c
      - password_encryption=scram-sha-256
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
      - -c
      - listen_addresses=*
    volumes:
      - flowform_postgres_core_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
      - ../postgres/config/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    secrets:
      - FF_PGDB_INIT__PASSWORD
      - FF_PGDB_CORE__APP_PASSWORD
    networks:
      - flowform_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FF_PGDB_INIT__USER} -d ${FF_PGDB_CORE__DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-response:
    image: postgres:17
    container_name: flowform-postgres-response-test
    environment:
      FF_PGDB_INIT__TARGET: response
      POSTGRES_USER: ${FF_PGDB_INIT__USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/FF_PGDB_INIT__PASSWORD
      POSTGRES_DB: ${FF_PGDB_RESPONSE__DB_NAME}

      FF_PGDB_RESPONSE__DB_NAME: ${FF_PGDB_RESPONSE__DB_NAME}
      FF_PGDB_RESPONSE__APP_USER: ${FF_PGDB_RESPONSE__APP_USER}
      FF_PGDB_RESPONSE__APP_PASSWORD_FILE: /run/secrets/FF_PGDB_RESPONSE__APP_PASSWORD
      FF_PGDB_RESPONSE__SCHEMA_FILE: ${FF_PGDB_RESPONSE__SCHEMA_FILE}
    ports:
      - "127.0.0.1:${FF_PGDB_RESPONSE_COMPOSE__PUBLISHED_PORT:-5433}:${FF_PGDB_RESPONSE_COMPOSE__PORT:-5432}"
    command:
      - postgres
      - -c
      - password_encryption=scram-sha-256
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
      - -c
      - listen_addresses=*
    volumes:
      - flowform_postgres_response_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
      - ../postgres/config/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    secrets:
      - FF_PGDB_INIT__PASSWORD
      - FF_PGDB_RESPONSE__APP_PASSWORD
    networks:
      - flowform_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FF_PGDB_INIT__USER} -d ${FF_PGDB_RESPONSE__DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10


  backend-test:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    working_dir: /app
    init: true
    env_file:
      - ./.backend.env
    container_name: flowform-backend-test
    environment:
      PYTHONUNBUFFERED: "1"
      FF_ENV: test
      FF_PGDB_CORE__APP_USER: ${FF_PGDB_CORE__APP_USER}
      FF_PGDB_CORE__APP_PASSWORD_FILE: /run/secrets/FF_PGDB_CORE__APP_PASSWORD
      FF_PGDB_RESPONSE__APP_USER: ${FF_PGDB_RESPONSE__APP_USER}
      FF_PGDB_RESPONSE__APP_PASSWORD_FILE: /run/secrets/FF_PGDB_RESPONSE__APP_PASSWORD
    command: ["sh", "-lc", "tail -f /dev/null"]
    volumes:
      - ../../backend:/app
      - ../../backend/logs:/app/logs
      - flowform_backend_test_venv:/app/.venv
    depends_on:
      postgres-core:
        condition: service_healthy
      postgres-response:
        condition: service_healthy
    secrets:
      - FF_PGDB_CORE__APP_PASSWORD
      - FF_PGDB_RESPONSE__APP_PASSWORD
    networks:
      - flowform_net

volumes:
  flowform_postgres_core_data:
  flowform_postgres_response_data:
  flowform_backend_test_venv:

networks:
  flowform_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.50.0.0/16

secrets:
  FF_PGDB_INIT__PASSWORD:
    file: ./secrets/FF_PGDB_INIT__PASSWORD.secret.txt
  FF_PGDB_CORE__APP_PASSWORD:
    file: ./secrets/FF_PGDB_CORE__APP_PASSWORD.secret.txt
  FF_PGDB_RESPONSE__APP_PASSWORD:
    file: ./secrets/FF_PGDB_RESPONSE__APP_PASSWORD.secret.txt