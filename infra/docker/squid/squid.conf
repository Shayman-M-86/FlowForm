http_port 3128

# Rendered by docker-compose.proxy.yml from SQUID_APP_SOURCE_CIDR. Production
# should set the exact app EC2 source CIDR, normally <APP_PRIVATE_IP>/32.
acl app_ec2 src __APP_SOURCE_CIDR__
acl SSL_ports port 443
acl CONNECT method CONNECT
acl allowed_domains dstdomain "/etc/squid/allowed-domains.txt"

http_access deny !app_ec2
http_access deny CONNECT !SSL_ports
http_access allow app_ec2 CONNECT allowed_domains
http_access deny all

cache deny all

via off
forwarded_for delete
request_header_access X-Forwarded-For deny all
request_header_access Via deny all

access_log stdio:/var/log/squid/access.log
