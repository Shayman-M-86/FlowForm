# Rehearsal TLS shim (runs on ls-vm / 10.10.10.30, beside LocalStack).
#
# Caddy terminates TLS for the *.localstack.test SNI names on :443 and reverse-
# proxies to LocalStack. host networking so it binds the private NIC's :443 and
# reaches LocalStack at 127.0.0.1:4566 (LocalStack publishes 10.10.10.30:4566,
# reachable as 127.0.0.1 from the host netns).
#
# The pinned Caddy image arrives in the offline rehearsal artifact bundle.

services:
  tls-shim:
    image: caddy:2-alpine
    container_name: flowform-tls-shim
    restart: unless-stopped
    network_mode: host
    volumes:
      - /opt/flowform/tls-shim/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/flowform/tls-shim/certs:/etc/caddy/certs:ro   # pre-generated cert+key
      - tls_shim_data:/data
      - tls_shim_config:/config
    healthcheck:
      # up when it answers TLS on :443 for an SNI name (localhost resolves it via
      # the container's own view; --no-check-certificate since busybox lacks the CA)
      test: ["CMD", "sh", "-c", "wget -q --no-check-certificate --header 'Host: ssm.localstack.test' -O /dev/null https://10.10.10.30/_localstack/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s

volumes:
  tls_shim_data:
  tls_shim_config:
