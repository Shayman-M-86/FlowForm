# LocalStack fixture for the rehearsal (runs on ls-vm / 10.10.10.30).
#
# Fake AWS: only the services the bootstrap actually calls — Secrets Manager,
# SSM Parameter Store, KMS. Bootstrap hits these with the REAL aws CLI via
# BOOTSTRAP_ENDPOINT_URL, so the AWS code path is exercised, not stubbed.
#
# LocalStack serves plain HTTP on :4566. The app box never talks to it directly
# — it goes app-vm → Squid (CONNECT :443, SNI allow-list) → TLS shim → here.
# On the private net (10.10.10.0/24) plain HTTP is acceptable for the seed path;
# the TLS/SNI fidelity is added by the shim on the proxy box (separate fixture).

services:
  localstack:
    image: localstack/localstack:3
    container_name: flowform-localstack
    restart: unless-stopped
    ports:
      - "10.10.10.30:4566:4566"   # bind the private NIC, not 0.0.0.0
    environment:
      - SERVICES=secretsmanager,ssm,kms
      - DEBUG=0
      - PERSISTENCE=0             # rehearsal: fresh state each boot; re-seed
      - EAGER_SERVICE_LOADING=1   # start the 3 services now, not on first call
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      # LocalStack reports per-service readiness on /_localstack/health
      test: ["CMD", "curl", "-fsS", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
