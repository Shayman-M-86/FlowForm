#cloud-config
# Dev-box template BUILDER user-data (rehearsal only).
#
# Clones of the golden template already have Docker + AWS CLI + guest agent.
# This builder adds operator conveniences for the dev/jump box, then cleans and
# powers off. The host (create-dev-template.sh) waits for 'stopped'.

packages:
  - git
  - yq
  - python3-venv
  - python3-pip
  - make
  - less
  - vim-tiny

write_files:
  # Dev-box ONLY: make the AWS CLI target the rehearsal LocalStack by default, so
  # plain `aws ...` (no --endpoint-url, no env) works even over non-interactive
  # SSH. Read directly by the CLI regardless of shell init. NOT in the golden
  # template — proxy/app get their endpoint from the bootstrap BOOTSTRAP_ENDPOINT_URL
  # seam (prod uses no override). Fake creds; LocalStack ignores their validity.
  - path: /home/flowform/.aws/config
    content: |
      [default]
      region = ap-southeast-2
      output = json
      endpoint_url = http://10.10.10.30:4566
  - path: /home/flowform/.aws/credentials
    permissions: '0600'
    content: |
      [default]
      aws_access_key_id = test
      aws_secret_access_key = test

  # Dev-box ONLY: trust the rehearsal's private HTTP registry so the operator can
  # `docker push` the backend image to 10.10.10.10:5000 (build-and-push-backend.sh).
  # Rehearsal delta — prod pushes to ECR over HTTPS. Baked here (persistent dev-box
  # property), unlike app/proxy which get it via their runtime cloud-init.
  - path: /etc/docker/daemon.json
    permissions: '0644'
    content: |
      {
        "insecure-registries": ["10.10.10.10:5000"]
      }

runcmd:
  # awslocal: thin AWS CLI wrapper preset for the rehearsal LocalStack endpoint.
  - pip install --break-system-packages awscli-local || pipx install awscli-local || true
  # the flowform user must own its ~/.aws (write_files runs as root)
  - chown -R flowform:flowform /home/flowform/.aws
  # sanity: fail the build (no poweroff) if core tools are missing
  - git --version
  - /usr/local/bin/aws --version
  # --- SEAL: clean so clones start fresh, then power off as the done-signal ---
  - apt-get clean
  - rm -rf /var/lib/apt/lists/*
  - cloud-init clean --logs
  - truncate -s 0 /etc/machine-id
  - rm -f /var/lib/dbus/machine-id
  - poweroff
