#cloud-config
# Golden-template BUILDER user-data (rehearsal only).
#
# Self-provisions the golden base on first boot, cleans itself, then powers off.
# The host (create-template.sh) needs no agent/SSH into the guest — it just waits
# for the VM to reach 'stopped' and converts the disk to a template.
#
# Installs host deps ONLY: Docker + Compose plugin, AWS CLI v2, qemu-guest-agent
# (so CLONES of this template have a working agent), base tools. No app, no
# secrets. The root fs is grown by cloud-init's own growpart (default) into the
# disk the host resized through Proxmox.

package_update: true
package_upgrade: false

# Base packages from the Ubuntu archive (Docker comes from Docker's repo below).
packages:
  - ca-certificates
  - curl
  - jq
  - unzip
  - gnupg
  - nftables
  - qemu-guest-agent

write_files:
  # Docker's apt repo, added declaratively so runcmd stays short.
  - path: /etc/apt/sources.list.d/docker.list
    content: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable\n"
    permissions: '0644'

  # Disable cloud-init's default apt refresh for ALL FUTURE (clone) boots. The
  # offline app/ls boxes have no route to a mirror, so the default
  # package_update/upgrade wastes ~3min hammering DNS timeouts before giving up.
  # Everything the boxes need is baked, so there's nothing to fetch at boot.
  # (This does NOT affect the builder's own install — that already ran in runcmd
  # before this box ever reboots.) apt_configure is dropped from cloud_init_modules
  # so clones don't even rewrite sources.list against unreachable mirrors.
  - path: /etc/cloud/cloud.cfg.d/99-flowform-no-apt.cfg
    permissions: '0644'
    content: |
      # FlowForm rehearsal: offline boxes never touch apt at boot.
      package_update: false
      package_upgrade: false
      package_reboot_if_required: false
      apt:
        preserve_sources_list: true

runcmd:
  # --- Docker CE + Compose plugin ---
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - apt-get update
  - DEBIAN_FRONTEND=noninteractive apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable docker
  # --- AWS CLI v2 (bundled installer; arch-detected) ---
  - |
    set -e
    case "$(uname -m)" in
      x86_64) A=x86_64 ;;
      aarch64) A=aarch64 ;;
      *) echo "unsupported arch $(uname -m)"; exit 1 ;;
    esac
    curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-${A}.zip" -o /tmp/awscliv2.zip
    cd /tmp && unzip -q awscliv2.zip && ./aws/install && rm -rf /tmp/aws /tmp/awscliv2.zip
  # --- guest agent up now (clones inherit it enabled) ---
  - systemctl enable --now qemu-guest-agent
  - install -d -m 0755 /opt/flowform
  # --- sanity: fail the build (no poweroff) if anything is missing ---
  - /usr/local/bin/aws --version
  - docker --version
  - docker compose version
  # --- SEAL: clean so clones start fresh, then power off as the done-signal ---
  - apt-get clean
  - rm -rf /var/lib/apt/lists/*
  - cloud-init clean --logs
  - truncate -s 0 /etc/machine-id
  - rm -f /var/lib/dbus/machine-id
  - poweroff

# If any runcmd step fails, cloud-init does NOT reach poweroff, so the VM stays
# running and the host's wait-for-stopped loop times out → build fails loudly
# instead of sealing a broken template.
